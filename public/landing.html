<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ViralPX — منصة البورتفوليو الاحترافي</title>
<meta name="description" content="منصة بناء بورتفوليو احترافي للمصممين والمبدعين. بدون كود، بدون تعقيد.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --o:#F97316;--od:#EA6C0A;--ol:#FB923C;
  --bg:#0A0A0A;--bg2:#111;--bg3:#161616;--bg4:#1e1e1e;
  --tx:#fff;--tx2:#ccc;--tx3:#888;--tx4:#666;
  --brd:#1f1f1f;--brd2:#2a2a2a;
  --grad:linear-gradient(135deg,#F97316 0%,#EA6C0A 100%);
  --grad-soft:linear-gradient(135deg,rgba(249,115,22,.12),rgba(234,108,10,.04));
  --max:1180px;
}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;line-height:1.6}
html[dir="ltr"]{text-align:left}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none}

/* Container */
.wrap{max-width:var(--max);margin:0 auto;padding:0 24px}

/* ─── NAVBAR ─── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--brd);transition:all .3s}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;max-width:var(--max);margin:0 auto}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:18px}
.nav-logo i{color:var(--o);font-size:20px}
.nav-logo img{height:32px;width:auto}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none}
.nav-links a{font-size:14px;font-weight:600;color:var(--tx2);transition:color .2s}
.nav-links a:hover{color:var(--o)}
.nav-cta{display:flex;align-items:center;gap:10px}
.nav-cta .lang-btn{background:transparent;color:var(--tx2);font-size:13px;font-weight:700;padding:8px 12px;border-radius:8px;border:1px solid var(--brd2);transition:all .2s}
.nav-cta .lang-btn:hover{border-color:var(--o);color:var(--o)}
.nav-cta .btn-primary{background:var(--grad);color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:8px;box-shadow:0 6px 16px rgba(249,115,22,.3);transition:transform .2s}
.nav-cta .btn-primary:hover{transform:translateY(-1px)}
.nav-burger{display:none;background:transparent;color:var(--tx);font-size:20px;padding:8px}
@media(max-width:900px){
  .nav-links,.nav-cta .btn-primary{display:none}
  .nav-burger{display:block}
}

/* Mobile menu */
.mob-menu{position:fixed;inset:60px 0 0 0;background:rgba(10,10,10,.98);backdrop-filter:blur(20px);z-index:99;padding:40px 24px;display:none;flex-direction:column;gap:8px}
.mob-menu.open{display:flex}
.mob-menu a{padding:16px 20px;font-size:16px;font-weight:700;color:var(--tx);border-radius:10px;transition:background .2s}
.mob-menu a:hover{background:var(--bg3)}
.mob-menu .btn-primary{margin-top:14px;text-align:center;background:var(--grad);padding:14px 20px;border-radius:10px}

/* ─── HERO ─── */
.hero{padding:140px 0 80px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(249,115,22,.15) 0%,transparent 70%);pointer-events:none;z-index:0}
.hero.has-cover{padding:160px 0 100px}
.hero-bg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;opacity:.35}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,10,.6) 0%,rgba(10,10,10,.85) 60%,rgba(10,10,10,1) 100%)}
.hero-inner{position:relative;z-index:1;text-align:center;max-width:880px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--grad-soft);border:1px solid rgba(249,115,22,.25);color:var(--o);padding:8px 18px;border-radius:30px;font-size:13px;font-weight:700;margin-bottom:28px}
.hero-badge i{font-size:11px}
.hero h1{font-family:'Cairo',sans-serif;font-size:clamp(34px,5.5vw,62px);font-weight:900;line-height:1.15;margin-bottom:22px;letter-spacing:-.5px}
.hero h1 .grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero-sub{font-size:clamp(15px,1.6vw,18px);color:var(--tx2);max-width:680px;margin:0 auto 38px;line-height:1.75}
.hero-actions{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:15px 30px;border-radius:11px;font-size:15px;font-weight:700;transition:all .25s;cursor:pointer;font-family:inherit;border:none}
.btn-pri{background:var(--grad);color:#fff;box-shadow:0 10px 24px rgba(249,115,22,.32)}
.btn-pri:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(249,115,22,.42)}
.btn-sec{background:transparent;color:var(--tx);border:1.5px solid var(--brd2)}
.btn-sec:hover{border-color:var(--o);color:var(--o);background:rgba(249,115,22,.05)}
.hero-image{margin-top:60px;max-width:900px;margin-left:auto;margin-right:auto;position:relative}
.hero-image img{border-radius:16px;border:1px solid var(--brd2);box-shadow:0 30px 80px rgba(0,0,0,.5);width:100%}
.hero-image-placeholder{aspect-ratio:16/9;border:2px dashed var(--brd2);border-radius:16px;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--tx4);font-size:14px}

/* Hero video */
.hero-video-wrap{margin-top:60px;max-width:920px;margin-left:auto;margin-right:auto;position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--brd2);box-shadow:0 30px 80px rgba(0,0,0,.5);aspect-ratio:16/9;background:#000}
.hero-video-wrap iframe,.hero-video-wrap video{width:100%;height:100%;border:none;display:block}
.hero-video-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);cursor:pointer;z-index:2;transition:background .2s}
.hero-video-play:hover{background:rgba(0,0,0,.55)}
.hero-video-play-btn{width:88px;height:88px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;box-shadow:0 14px 40px rgba(249,115,22,.5);padding-left:6px;transition:transform .25s}
.hero-video-play:hover .hero-video-play-btn{transform:scale(1.08)}

/* ─── SECTION COMMON ─── */
.sec{padding:90px 0;position:relative}
.sec-head{text-align:center;max-width:680px;margin:0 auto 56px}
.sec-eyebrow{display:inline-block;color:var(--o);font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.sec-title{font-size:clamp(28px,3.8vw,42px);font-weight:900;line-height:1.2;margin-bottom:18px;letter-spacing:-.3px}
.sec-sub{color:var(--tx2);font-size:16px;line-height:1.75}

/* ─── FEATURES ─── */
#features{background:var(--bg2)}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
@media(max-width:900px){.features-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.features-grid{grid-template-columns:1fr}}
.feature-card{background:var(--bg);border:1px solid var(--brd);border-radius:16px;padding:32px 26px;transition:all .25s;position:relative;overflow:hidden}
.feature-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);transform:scaleX(0);transform-origin:right;transition:transform .35s}
.feature-card:hover{transform:translateY(-4px);border-color:var(--brd2)}
.feature-card:hover::before{transform:scaleX(1);transform-origin:left}
.feature-icon{width:54px;height:54px;border-radius:12px;background:var(--grad-soft);color:var(--o);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:20px;overflow:hidden}
.feature-icon img{width:100%;height:100%;object-fit:contain;padding:8px}
.feature-card h3{font-size:18px;font-weight:800;margin-bottom:10px}
.feature-card p{color:var(--tx3);font-size:14px;line-height:1.7}

/* ─── PROJECTS SHOWCASE (competitive advantage) ─── */
#projects{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--bg) 0%,#0d0d0d 100%)}
#projects::before{content:'';position:absolute;top:-300px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(249,115,22,.18) 0%,transparent 70%);pointer-events:none}
#projects::after{content:'';position:absolute;bottom:-200px;left:-150px;width:500px;height:500px;background:radial-gradient(circle,rgba(249,115,22,.12) 0%,transparent 70%);pointer-events:none}
.proj-wrap{position:relative;z-index:1}
.proj-highlight{display:inline-flex;align-items:center;gap:8px;background:var(--grad);color:#fff;padding:7px 16px;border-radius:30px;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;box-shadow:0 8px 20px rgba(249,115,22,.4)}
.proj-highlight i{font-size:11px}
.proj-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:60px;align-items:center;margin-top:50px}
@media(max-width:900px){.proj-grid{grid-template-columns:1fr;gap:40px}}
.proj-features{display:flex;flex-direction:column;gap:20px}
.proj-feat{display:flex;gap:18px;align-items:flex-start;padding:20px;background:var(--bg2);border:1px solid var(--brd);border-radius:14px;transition:all .3s}
.proj-feat:hover{border-color:var(--o);transform:translateX(-4px);background:var(--bg3)}
html[dir="ltr"] .proj-feat:hover{transform:translateX(4px)}
.proj-feat-icon{width:48px;height:48px;border-radius:11px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 6px 16px rgba(249,115,22,.3)}
.proj-feat-text h4{font-size:16px;font-weight:800;margin-bottom:6px}
.proj-feat-text p{font-size:13px;color:var(--tx3);line-height:1.7}
/* Project media (image or video) */
.proj-media{position:relative;border-radius:20px;overflow:hidden;aspect-ratio:4/3;background:var(--bg2);box-shadow:0 30px 70px rgba(0,0,0,.5)}
.proj-media img,.proj-media video,.proj-media iframe{display:block;width:100%;height:100%}

/* Examples gallery */
.ex-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
@media(max-width:900px){.ex-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.ex-grid{grid-template-columns:1fr}}
.ex-card{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;transition:all .3s;display:flex;flex-direction:column}
.ex-card:hover{transform:translateY(-4px);border-color:var(--o);box-shadow:0 20px 40px rgba(0,0,0,.4)}
.ex-thumb{position:relative;aspect-ratio:16/10;background:var(--bg3);overflow:hidden}
.ex-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.ex-card:hover .ex-thumb img{transform:scale(1.05)}
.ex-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--tx4);font-size:42px;background:linear-gradient(135deg,var(--bg3),var(--bg))}
.ex-overlay{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:9px;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transform:translateY(-4px);transition:.25s}
html[dir="ltr"] .ex-overlay{right:auto;left:12px}
.ex-card:hover .ex-overlay{opacity:1;transform:translateY(0)}
.ex-info{padding:18px 20px}
.ex-name{font-weight:800;font-size:16px;margin-bottom:4px}
.ex-desc{color:var(--tx3);font-size:13px;line-height:1.6;margin-bottom:8px}
.ex-url{color:var(--o);font-size:12px;font-weight:600;direction:ltr;text-align:start;word-break:break-all}

/* ─── HOW IT WORKS ─── */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;position:relative}
@media(max-width:800px){.steps{grid-template-columns:1fr;gap:24px}}
.step{text-align:center;position:relative}
.step-num{width:64px;height:64px;border-radius:50%;background:var(--grad);color:#fff;font-family:'Montserrat',sans-serif;font-size:24px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 10px 24px rgba(249,115,22,.3)}
.step h3{font-size:19px;font-weight:800;margin-bottom:10px}
.step p{color:var(--tx3);font-size:14px;line-height:1.75;max-width:280px;margin:0 auto}

/* ─── PRICING ─── */
#pricing{background:var(--bg2)}
.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
@media(max-width:900px){.plans{grid-template-columns:1fr;max-width:420px;margin:0 auto}}
.plan{background:var(--bg);border:1px solid var(--brd);border-radius:18px;padding:36px 28px;position:relative;transition:all .25s}
.plan:hover{transform:translateY(-3px);border-color:var(--brd2)}
.plan.popular{border-color:var(--o);background:linear-gradient(180deg,rgba(249,115,22,.06),var(--bg) 40%);transform:scale(1.03)}
.plan.popular::before{content:attr(data-pop);position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--grad);color:#fff;font-size:11px;font-weight:800;padding:6px 18px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;box-shadow:0 6px 14px rgba(249,115,22,.4)}
.plan-name{font-size:14px;font-weight:800;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.plan-price{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.plan-price .num{font-family:'Montserrat',sans-serif;font-size:48px;font-weight:900;line-height:1}
.plan-price .cur{color:var(--tx3);font-size:14px;font-weight:700}
.plan-period{color:var(--tx3);font-size:13px;margin-bottom:24px}
.plan-features{list-style:none;margin-bottom:28px}
.plan-features li{display:flex;align-items:flex-start;gap:10px;padding:10px 0;font-size:14px;color:var(--tx2);border-bottom:1px solid var(--brd)}
.plan-features li:last-child{border-bottom:none}
.plan-features li i{color:var(--o);font-size:13px;margin-top:5px;flex-shrink:0}
.plan-cta{display:block;width:100%;text-align:center;padding:14px;border-radius:10px;font-weight:700;font-size:14px;background:var(--bg3);color:var(--tx);border:1px solid var(--brd2);transition:all .2s}
.plan-cta:hover{background:var(--bg4);border-color:var(--o);color:var(--o)}
.plan.popular .plan-cta{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(249,115,22,.3)}
.plan.popular .plan-cta:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(249,115,22,.4);color:#fff}

/* ─── TESTIMONIALS ─── */
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
@media(max-width:900px){.testi-grid{grid-template-columns:1fr}}
.testi-card{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:28px;transition:all .25s;position:relative}
.testi-card:hover{border-color:var(--brd2);transform:translateY(-3px)}
.testi-quote{font-size:48px;color:var(--o);opacity:.2;font-family:'Montserrat',sans-serif;line-height:1;margin-bottom:8px}
.testi-content{color:var(--tx2);font-size:15px;line-height:1.75;margin-bottom:22px}
.testi-author{display:flex;align-items:center;gap:14px}
.testi-photo{width:48px;height:48px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:20px;overflow:hidden;flex-shrink:0}
.testi-photo img{width:100%;height:100%;object-fit:cover}
.testi-name{font-weight:800;font-size:14px}
.testi-role{color:var(--tx3);font-size:12px;margin-top:2px}
.testi-empty{text-align:center;padding:60px 20px;color:var(--tx4)}

/* ─── FAQ ─── */
#faq{background:var(--bg2)}
.faq-list{max-width:780px;margin:0 auto}
.faq-item{background:var(--bg);border:1px solid var(--brd);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.faq-item:hover{border-color:var(--brd2)}
.faq-item.open{border-color:var(--o)}
.faq-q{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-weight:700;font-size:15px;gap:14px}
.faq-q i{color:var(--o);transition:transform .25s;font-size:13px;flex-shrink:0}
.faq-item.open .faq-q i{transform:rotate(180deg)}
.faq-a{padding:0 24px;max-height:0;overflow:hidden;color:var(--tx2);font-size:14px;line-height:1.8;transition:all .3s ease}
.faq-item.open .faq-a{padding:0 24px 22px;max-height:500px}

/* ─── CTA ─── */
.cta-box{background:var(--grad);border-radius:24px;padding:60px 40px;text-align:center;max-width:920px;margin:0 auto;position:relative;overflow:hidden;box-shadow:0 30px 60px rgba(249,115,22,.25)}
.cta-box::before{content:'';position:absolute;top:-100px;right:-100px;width:300px;height:300px;background:rgba(255,255,255,.08);border-radius:50%}
.cta-box::after{content:'';position:absolute;bottom:-150px;left:-150px;width:400px;height:400px;background:rgba(255,255,255,.05);border-radius:50%}
.cta-box>*{position:relative;z-index:1}
.cta-title{font-size:clamp(26px,3.5vw,38px);font-weight:900;color:#fff;margin-bottom:14px;line-height:1.2}
.cta-sub{color:rgba(255,255,255,.92);font-size:16px;margin-bottom:28px;max-width:580px;margin-left:auto;margin-right:auto}
.cta-btn{display:inline-flex;align-items:center;gap:10px;background:#fff;color:var(--o);padding:16px 36px;border-radius:11px;font-weight:800;font-size:16px;transition:transform .2s;box-shadow:0 10px 28px rgba(0,0,0,.2)}
.cta-btn:hover{transform:translateY(-2px)}

/* ─── FOOTER ─── */
.footer{background:#050505;border-top:1px solid var(--brd);padding:60px 0 28px}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:50px;margin-bottom:40px}
@media(max-width:800px){.footer-grid{grid-template-columns:1fr;gap:32px}}
.footer-brand .nav-logo{margin-bottom:14px}
.footer-tag{color:var(--tx3);font-size:14px;line-height:1.7;max-width:340px;margin-bottom:20px}
.footer-social{display:flex;gap:10px}
.footer-social a{width:38px;height:38px;border-radius:9px;background:var(--bg3);border:1px solid var(--brd);color:var(--tx2);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s}
.footer-social a:hover{background:var(--o);color:#fff;border-color:var(--o);transform:translateY(-2px)}
.footer-col h4{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:18px;color:var(--tx)}
.footer-col ul{list-style:none}
.footer-col li{margin-bottom:10px}
.footer-col a{color:var(--tx3);font-size:14px;transition:color .2s}
.footer-col a:hover{color:var(--o)}
.footer-bottom{border-top:1px solid var(--brd);padding-top:22px;text-align:center;color:var(--tx4);font-size:13px}

/* Mobile spacing */
@media(max-width:600px){
  .sec{padding:60px 0}
  .hero{padding:110px 0 60px}
  .cta-box{padding:42px 24px;border-radius:18px}
  .plan{padding:28px 22px}
  .plan.popular{transform:none}
}

/* ─── STATS COUNTER ─── */
#stats{background:linear-gradient(180deg,var(--bg2),var(--bg))}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.stats-grid{grid-template-columns:1fr}}
.stat-card{background:var(--bg);border:1px solid var(--brd);border-radius:16px;padding:32px 22px;text-align:center;transition:all .3s;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);transform:scaleX(0);transition:transform .4s}
.stat-card:hover{transform:translateY(-4px);border-color:var(--brd2)}
.stat-card:hover::before{transform:scaleX(1)}
.stat-icon{width:54px;height:54px;border-radius:14px;background:var(--grad-soft);color:var(--o);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 14px}
.stat-num{font-family:'Montserrat',sans-serif;font-size:46px;font-weight:900;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;margin-bottom:8px;display:inline-block}
.stat-label{color:var(--tx3);font-size:14px;font-weight:600}

/* ─── CONTACT ─── */
#contact{background:var(--bg2)}
.contact-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:40px;align-items:start;max-width:1000px;margin:0 auto}
@media(max-width:850px){.contact-grid{grid-template-columns:1fr;gap:30px}}
.contact-info{background:var(--bg);border:1px solid var(--brd);border-radius:16px;padding:30px}
.contact-info-title{font-size:18px;font-weight:800;margin-bottom:6px}
.contact-info-sub{color:var(--tx3);font-size:13px;margin-bottom:24px;line-height:1.7}
.contact-info-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--brd);text-decoration:none;color:var(--tx);transition:color .2s}
.contact-info-item:last-of-type{border-bottom:none}
.contact-info-item:hover{color:var(--o)}
.contact-info-icon{width:42px;height:42px;border-radius:10px;background:var(--grad-soft);color:var(--o);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:.2s}
.contact-info-item:hover .contact-info-icon{background:var(--grad);color:#fff}
.contact-info-text{flex:1;min-width:0}
.contact-info-label{font-size:12px;color:var(--tx3);font-weight:600;margin-bottom:2px}
.contact-info-value{font-size:14px;font-weight:700;direction:ltr;text-align:start;word-break:break-all}
.contact-socials{display:flex;gap:8px;margin-top:20px;padding-top:20px;border-top:1px solid var(--brd)}
.contact-socials a{width:40px;height:40px;border-radius:10px;background:var(--bg3);border:1px solid var(--brd);color:var(--tx2);display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s;text-decoration:none}
.contact-socials a:hover{background:var(--o);color:#fff;border-color:var(--o);transform:translateY(-2px)}

.contact-form{background:var(--bg);border:1px solid var(--brd);border-radius:16px;padding:30px}
.cform-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:500px){.cform-row{grid-template-columns:1fr}}
.cform-field{display:flex;flex-direction:column;gap:6px}
.cform-field label{font-size:12px;color:var(--tx3);font-weight:600}
.cform-field input,.cform-field textarea{width:100%;background:var(--bg2);border:1px solid var(--brd);color:#fff;padding:13px 15px;border-radius:10px;font-family:inherit;font-size:14px;outline:none;transition:.2s}
.cform-field input:focus,.cform-field textarea:focus{border-color:var(--o)}
.cform-field textarea{resize:vertical;min-height:120px;line-height:1.6}
.cform-submit{width:100%;background:var(--grad);color:#fff;border:none;padding:15px;border-radius:11px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 10px 24px rgba(249,115,22,.32);transition:transform .2s;margin-top:8px}
.cform-submit:hover:not(:disabled){transform:translateY(-2px)}
.cform-submit:disabled{opacity:.6;cursor:wait}

/* ─── WHATSAPP FLOAT ─── */
.wa-float{position:fixed;bottom:24px;left:24px;z-index:990;background:#25D366;color:#fff;border:none;width:62px;height:62px;border-radius:50%;font-size:30px;cursor:pointer;box-shadow:0 6px 24px rgba(37,211,102,.5);transition:transform .25s,box-shadow .25s;display:none;align-items:center;justify-content:center;text-decoration:none}
html[dir="ltr"] .wa-float{left:auto;right:24px}
.wa-float.show{display:flex}
.wa-float:hover{transform:scale(1.08);box-shadow:0 8px 30px rgba(37,211,102,.7)}
.wa-float i{animation:waPulse 2s ease-in-out infinite}
@keyframes waPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@media(max-width:600px){.wa-float{bottom:18px;left:18px;width:54px;height:54px;font-size:26px}html[dir="ltr"] .wa-float{left:auto;right:18px}}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:14px 26px;border-radius:11px;font-size:14px;font-weight:700;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s;box-shadow:0 10px 24px rgba(0,0,0,.4)}
.toast.show{opacity:1}
.toast.success{background:#22c55e;color:#fff}
.toast.error{background:#ef4444;color:#fff}

/* Animation */
.fade-up{opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s ease}
.fade-up.in{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<!-- ───── NAVBAR ───── -->
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo" id="navLogo"><i class="fa-solid fa-gem"></i> <span>ViralPX</span></a>
    <ul class="nav-links" id="navLinks"></ul>
    <div class="nav-cta">
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
      <a href="#pricing" class="btn-primary" id="navCta">ابدأ مجاناً</a>
      <button class="nav-burger" onclick="toggleMobMenu()"><i class="fa-solid fa-bars"></i></button>
    </div>
  </div>
</nav>
<div class="mob-menu" id="mobMenu"></div>

<!-- ───── MAIN ───── -->
<main id="main"></main>

<!-- ───── FOOTER ───── -->
<footer class="footer" id="footer"></footer>

<!-- ───── WHATSAPP FLOAT ───── -->
<a id="waFloat" class="wa-float" target="_blank" rel="noopener" aria-label="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>

<!-- ───── TOAST ───── -->
<div class="toast" id="toast"></div>

<script>
let LANG = localStorage.getItem('lang') || 'ar';
let DATA = null;
const ar = () => LANG === 'ar';
const T = k => (DATA && DATA[k]) || '';

async function init(){
  try{
    const r = await fetch('/api/landing').then(r=>r.json());
    DATA = r;
  }catch{ DATA = null; }
  if(!DATA){
    document.getElementById('main').innerHTML = '<div style="padding:120px 24px;text-align:center;color:#888"><i class="fa-solid fa-triangle-exclamation" style="font-size:48px;color:#F97316;margin-bottom:20px;display:block"></i>تعذّر تحميل البيانات. حاول إعادة تحميل الصفحة.</div>';
    return;
  }
  applyLang();
  render();
  setupScroll();
}

function applyLang(){
  document.documentElement.lang = LANG;
  document.documentElement.dir  = ar() ? 'rtl' : 'ltr';
  document.getElementById('langBtn').textContent = ar() ? 'EN' : 'ع';
}

// Apply the customizable theme (colors + fonts + radius) by overriding CSS vars
function applyStyle(){
  const s = (DATA && DATA.style) || {};
  const r = document.documentElement.style;
  if(s.primary_color)      r.setProperty('--o',  s.primary_color);
  if(s.primary_color_dark) r.setProperty('--od', s.primary_color_dark);
  if(s.bg_color)           r.setProperty('--bg', s.bg_color);
  if(s.bg_color_alt)       r.setProperty('--bg2', s.bg_color_alt);
  if(s.text_color)         r.setProperty('--tx', s.text_color);
  if(s.text_muted)         r.setProperty('--tx3', s.text_muted);
  // Gradient + soft variant follow the primary
  if(s.primary_color && s.primary_color_dark){
    r.setProperty('--grad', `linear-gradient(135deg,${s.primary_color} 0%,${s.primary_color_dark} 100%)`);
  }
  // Font family
  if(s.font_ar || s.font_en){
    const fa = s.font_ar || 'Cairo', fe = s.font_en || 'Montserrat';
    document.body.style.fontFamily = ar() ? `'${fa}',sans-serif` : `'${fe}','${fa}',sans-serif`;
    // Lazy-load Google Font (only once per family)
    [fa, fe].forEach(fname => {
      if(!fname) return;
      const id = 'gf-' + fname.replace(/[^a-z0-9]/gi,'').toLowerCase();
      if(document.getElementById(id)) return;
      const link = document.createElement('link');
      link.id = id;
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(fname)}:wght@400;600;700;800;900&display=swap`;
      document.head.appendChild(link);
    });
  }
}

function toggleLang(){
  LANG = ar() ? 'en' : 'ar';
  localStorage.setItem('lang', LANG);
  applyLang();
  render();
  setupScroll(); // re-observe new fade-up elements
}

function L(o, key){
  if(!o) return '';
  return o[key+'_'+LANG] || o[key+'_'+(ar()?'en':'ar')] || o[key] || '';
}

function toggleMobMenu(){
  document.getElementById('mobMenu').classList.toggle('open');
}

function render(){
  if(!DATA) return;
  applyStyle();
  renderNav();
  renderMain();
  renderFooter();
  renderWhatsAppFloat();
}

function renderWhatsAppFloat(){
  const wa = (DATA.footer && DATA.footer.whatsapp) || '';
  const el = document.getElementById('waFloat');
  if(!el) return;
  if(wa){
    const num = wa.replace(/[^\d]/g, '');
    el.href = `https://wa.me/${num}`;
    el.classList.add('show');
  } else {
    el.classList.remove('show');
    el.removeAttribute('href');
  }
}

// Toast helper
let _toastTimer;
function toast(msg, type='success'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

function renderNav(){
  // Brand
  const logo = document.getElementById('navLogo');
  const brand = DATA.brand || {};
  if(brand.logo_url){
    logo.innerHTML = `<img src="${brand.logo_url}" alt="${brand.name||'logo'}">`;
  } else {
    logo.innerHTML = `<i class="fa-solid fa-gem"></i> <span>${brand.name || 'ViralPX'}</span>`;
  }
  // Links — only visible sections except hero
  const secs = (DATA.sections || []).filter(s => s.visible && s.id !== 'hero').sort((a,b)=>a.order-b.order);
  const links = secs.map(s => `<li><a href="#${s.id}">${L(s,'label')}</a></li>`).join('');
  document.getElementById('navLinks').innerHTML = links;
  // Mobile menu
  const mobMenu = document.getElementById('mobMenu');
  const cta = DATA.hero || {};
  mobMenu.innerHTML = secs.map(s=>`<a href="#${s.id}" onclick="toggleMobMenu()">${L(s,'label')}</a>`).join('')
    + `<a href="${cta.cta1_link||'#pricing'}" class="btn-primary" onclick="toggleMobMenu()">${L(cta,'cta1_text') || (ar()?'ابدأ مجاناً':'Get Started')}</a>`;
  // Nav CTA
  document.getElementById('navCta').textContent = L(cta,'cta1_text') || (ar()?'ابدأ مجاناً':'Get Started');
  document.getElementById('navCta').href = cta.cta1_link || '#pricing';
}

function renderMain(){
  const secs = (DATA.sections || []).filter(s => s.visible).sort((a,b)=>a.order-b.order);
  document.getElementById('main').innerHTML = secs.map(buildSection).join('');
}

function buildSection(s){
  switch(s.id){
    case 'hero':         return renderHero();
    case 'features':     return renderFeatures();
    case 'projects':     return renderProjects();
    case 'examples':     return renderExamples();
    case 'stats':        return renderStats();
    case 'how':          return renderHow();
    case 'pricing':      return renderPricing();
    case 'testimonials': return renderTestimonials();
    case 'faq':          return renderFaq();
    case 'contact':      return renderContact();
    case 'cta':          return renderCta();
    default: return '';
  }
}

// ── Video embed helper: converts YouTube/Vimeo URL to embed URL ──
function toEmbedUrl(url){
  if(!url) return '';
  // YouTube
  let m = url.match(/(?:youtube\.com\/(?:.*v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
  if(m) return `https://www.youtube.com/embed/${m[1]}?autoplay=1&rel=0`;
  // Vimeo
  m = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if(m) return `https://player.vimeo.com/video/${m[1]}?autoplay=1`;
  // Direct video file
  if(/\.(mp4|webm|ogg)(\?|$)/i.test(url)) return url;
  return url;
}

// Normalize WhatsApp number/link to https://wa.me/ URL
function waLink(val){
  if(!val) return '';
  const s = String(val).trim();
  if(/^https?:\/\//i.test(s)) return s;
  if(/^(wa\.me|api\.whatsapp\.com|whatsapp\.com)/i.test(s)) return 'https://' + s;
  const num = s.replace(/[^\d]/g,'');
  return num ? 'https://wa.me/' + num : '';
}

function renderHero(){
  const h = DATA.hero || {};
  const badge = L(h,'badge');
  // CTA1 default = WhatsApp (auto-link from footer.whatsapp) if no link set
  const wa = waLink((DATA.footer && DATA.footer.whatsapp) || '');
  const cta1Link = (h.cta1_link && h.cta1_link.trim()) || wa || '#pricing';
  const cta1IsWA = cta1Link.includes('wa.me');
  // Highlight last 2 words in gradient
  const title = L(h,'title') || '';
  const words = title.split(' ');
  let titleHtml = title;
  if(words.length > 2){
    const head = words.slice(0, words.length-2).join(' ');
    const tail = words.slice(-2).join(' ');
    titleHtml = `${head} <span class="grad-text">${tail}</span>`;
  }
  // Media: video > image > placeholder
  let media = '';
  if(h.video_url){
    media = `
      <div class="hero-video-wrap fade-up" id="heroVideo">
        ${h.image_url ? `<img src="${h.image_url}" alt="thumbnail" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">` : ''}
        <div class="hero-video-play" onclick="playHeroVideo('${h.video_url.replace(/'/g,"\\'")}')">
          <div class="hero-video-play-btn"><i class="fa-solid fa-play"></i></div>
        </div>
      </div>`;
  } else if(h.image_url){
    media = `<div class="hero-image fade-up"><img src="${h.image_url}" alt="hero"></div>`;
  } else {
    media = `<div class="hero-image fade-up"><div class="hero-image-placeholder"><span>${ar()?'صورة أو فيديو توضيحي للمنصة':'Platform preview image or video'}</span></div></div>`;
  }
  const coverBg = h.cover_url ? `<div class="hero-bg" style="background-image:url('${h.cover_url}')"></div>` : '';
  return `
  <section id="hero" class="hero ${h.cover_url?'has-cover':''}">
    ${coverBg}
    <div class="wrap hero-inner">
      ${badge ? `<div class="hero-badge fade-up"><i class="fa-solid fa-sparkles"></i> ${badge}</div>` : ''}
      <h1 class="fade-up">${titleHtml}</h1>
      <p class="hero-sub fade-up">${L(h,'subtitle')}</p>
      <div class="hero-actions fade-up">
        <a href="${cta1Link}" ${cta1IsWA?'target="_blank" rel="noopener"':''} class="btn btn-pri">${cta1IsWA?'<i class="fa-brands fa-whatsapp"></i> ':''}${L(h,'cta1_text') || (ar()?'ابدأ الآن':'Get Started')}</a>
        <a href="${h.cta2_link||'#examples'}" class="btn btn-sec">${L(h,'cta2_text') || (ar()?'اعرف أكتر':'Learn More')}</a>
      </div>
      ${media}
    </div>
  </section>`;
}

function playHeroVideo(url){
  const wrap = document.getElementById('heroVideo');
  if(!wrap) return;
  const embed = toEmbedUrl(url);
  const isDirect = /\.(mp4|webm|ogg)(\?|$)/i.test(embed);
  wrap.innerHTML = isDirect
    ? `<video src="${embed}" controls autoplay></video>`
    : `<iframe src="${embed}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
}

function renderFeatures(){
  const f = DATA.features || {};
  const cards = (f.items || []).map(it => {
    const iconHtml = it.icon_url
      ? `<img src="${it.icon_url}" alt="">`
      : `<i class="fa-solid ${it.icon||'fa-star'}"></i>`;
    return `
    <div class="feature-card fade-up">
      <div class="feature-icon">${iconHtml}</div>
      <h3>${L(it,'title')}</h3>
      <p>${L(it,'desc')}</p>
    </div>`;
  }).join('');
  return `
  <section id="features" class="sec">
    <div class="wrap">
      <div class="sec-head fade-up">
        <div class="sec-eyebrow">${ar()?'مميزاتنا':'Features'}</div>
        <h2 class="sec-title">${L(f,'title')}</h2>
        <p class="sec-sub">${L(f,'subtitle')}</p>
      </div>
      <div class="features-grid">${cards}</div>
    </div>
  </section>`;
}

function renderProjects(){
  const p = DATA.projects || {};
  const feats = (p.features || []).map(f => `
    <div class="proj-feat fade-up">
      <div class="proj-feat-icon"><i class="fa-solid ${f.icon||'fa-star'}"></i></div>
      <div class="proj-feat-text">
        <h4>${L(f,'title')}</h4>
        <p>${L(f,'desc')}</p>
      </div>
    </div>`).join('');
  // Media on the right — image or video (or empty placeholder)
  const url = (p.media_url||'').trim();
  let mediaHtml = '';
  if(url){
    const isVideo = /\.(mp4|webm|ogg)(\?|$)/i.test(url) || /youtube\.com|youtu\.be|vimeo\.com/i.test(url);
    if(isVideo){
      const embed = toEmbedUrl(url);
      if(/\.(mp4|webm|ogg)(\?|$)/i.test(embed)){
        mediaHtml = `<video src="${embed}" autoplay loop muted playsinline style="width:100%;height:100%;object-fit:cover;border-radius:18px;"></video>`;
      } else {
        mediaHtml = `<iframe src="${embed}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen style="width:100%;height:100%;border:none;border-radius:18px;"></iframe>`;
      }
    } else {
      mediaHtml = `<img src="${url}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:18px;">`;
    }
  } else {
    mediaHtml = `<div style="width:100%;aspect-ratio:4/3;border:2px dashed var(--brd2);border-radius:18px;display:flex;align-items:center;justify-content:center;color:var(--tx4);font-size:14px;text-align:center;padding:30px;">${ar()?'أضف صورة أو فيديو من لوحة التحكم':'Add an image or video from the dashboard'}</div>`;
  }
  const highlight = L(p,'highlight');
  return `
  <section id="projects" class="sec">
    <div class="wrap proj-wrap">
      <div class="sec-head fade-up">
        ${highlight ? `<div class="proj-highlight"><i class="fa-solid fa-trophy"></i> ${highlight}</div>` : `<div class="sec-eyebrow">${ar()?'الميزة التنافسية':'Competitive Edge'}</div>`}
        <h2 class="sec-title">${L(p,'title')}</h2>
        <p class="sec-sub">${L(p,'subtitle')}</p>
      </div>
      <div class="proj-grid">
        <div class="proj-features">${feats}</div>
        <div class="proj-media fade-up">${mediaHtml}</div>
      </div>
    </div>
  </section>`;
}

function renderExamples(){
  const e = DATA.examples || {};
  const items = (e.items || []);
  const cards = items.length
    ? items.map(it => {
        const preview = (it.preview_url || '').trim();
        const visual = preview
          ? `<img src="${preview}" alt="${esc(it.name||'')}" loading="lazy">`
          : `<div class="ex-ph"><i class="fa-solid fa-globe"></i></div>`;
        return `
        <a class="ex-card fade-up" href="${esc(it.url||'#')}" target="_blank" rel="noopener">
          <div class="ex-thumb">${visual}<div class="ex-overlay"><i class="fa-solid fa-arrow-up-right-from-square"></i></div></div>
          <div class="ex-info">
            <div class="ex-name">${esc(it.name||'')}</div>
            ${L(it,'description') ? `<div class="ex-desc">${L(it,'description')}</div>` : ''}
            <div class="ex-url">${esc((it.url||'').replace(/^https?:\/\//,''))}</div>
          </div>
        </a>`;
      }).join('')
    : `<div style="grid-column:1/-1;text-align:center;color:var(--tx4);padding:50px 20px">${ar()?'لم تُضِف نماذج بعد':'No examples added yet'}</div>`;
  return `
  <section id="examples" class="sec">
    <div class="wrap">
      <div class="sec-head fade-up">
        <div class="sec-eyebrow">${ar()?'نماذج حية':'Live Examples'}</div>
        <h2 class="sec-title">${L(e,'title')}</h2>
        <p class="sec-sub">${L(e,'subtitle')}</p>
      </div>
      <div class="ex-grid">${cards}</div>
    </div>
  </section>`;
}

function renderStats(){
  const s = DATA.stats || {};
  const cards = (s.items || []).map(it => `
    <div class="stat-card fade-up">
      ${it.icon ? `<div class="stat-icon"><i class="fa-solid ${it.icon}"></i></div>` : ''}
      <div class="stat-num" data-target="${esc(it.number||'0')}" data-suffix="${esc(it.suffix||'')}">0${esc(it.suffix||'')}</div>
      <div class="stat-label">${L(it,'label')}</div>
    </div>
  `).join('');
  return `
  <section id="stats" class="sec">
    <div class="wrap">
      <div class="sec-head fade-up">
        <div class="sec-eyebrow">${ar()?'إحصائيات':'Stats'}</div>
        <h2 class="sec-title">${L(s,'title')}</h2>
        <p class="sec-sub">${L(s,'subtitle')}</p>
      </div>
      <div class="stats-grid">${cards}</div>
    </div>
  </section>`;
}

function renderContact(){
  const c = DATA.contact || {};
  const f = DATA.footer || {};
  const social = f.social || {};
  // Info items: email + phone + whatsapp
  const infoItems = [
    f.email ? `<a class="contact-info-item" href="mailto:${esc(f.email)}"><div class="contact-info-icon"><i class="fa-solid fa-envelope"></i></div><div class="contact-info-text"><div class="contact-info-label">${L(c,'info_email_label')}</div><div class="contact-info-value">${esc(f.email)}</div></div></a>` : '',
    f.phone ? `<a class="contact-info-item" href="tel:${esc(f.phone)}"><div class="contact-info-icon"><i class="fa-solid fa-phone"></i></div><div class="contact-info-text"><div class="contact-info-label">${L(c,'info_phone_label')}</div><div class="contact-info-value">${esc(f.phone)}</div></div></a>` : '',

    .map(k => `<a href="${esc(social[k])}" target="_blank" rel="noopener" aria-label="${k}"><i class="fa-brands ${socialMap[k]}"></i></a>`)
    .join('') : '';
  const socialBlock = socialLinks ? `<div class="contact-socials">${socialLinks}</div>` : '';
  const infoBlock = `
    <div class="contact-info fade-up">
      <div class="contact-info-title">${ar()?'كلّمنا':'Reach Us'}</div>
      <div class="contact-info-sub">${ar()?'متاحين لكل استفسار، ابعتلنا في أي وقت':'Available for all inquiries, reach out anytime'}</div>

    </div>`;
  const formBlock = c.form_enabled === false ? '' : `
    <form class="contact-form fade-up" onsubmit="sendContactForm(event)">
      <div class="cform-row">
        <div class="cform-field"><label>${ar()?'الاسم':'Name'} *</label><input type="text" id="cf_name" required maxlength="100"></div>
        <div class="cform-field"><label>${ar()?'الإيميل':'Email'} *</label><input type="email" id="cf_email" required maxlength="200" dir="ltr"></div>
      </div>
      <div class="cform-row" style="grid-template-columns:1fr">
        <div class="cform-field"><label>${ar()?'الموضوع':'Subject'}</label><input type="text" id="cf_subject" maxlength="200"></div>
      </div>
      <div class="cform-row" style="grid-template-columns:1fr">
        <div class="cform-field"><label>${ar()?'الرسالة':'Message'} *</label><textarea id="cf_message" required maxlength="5000"></textarea></div>
      </div>
      <button type="submit" class="cform-submit" id="cf_btn">
        <i class="fa-solid fa-paper-plane"></i> ${ar()?'إرسال الرسالة':'Send Message'}
      </button>
    </form>`;
  return `
  <section id="contact" class="sec">
    <div class="wrap">
      <div class="sec-head fade-up">
        <div class="sec-eyebrow">${ar()?'تواصل':'Contact'}</div>
        <h2 class="sec-title">${L(c,'title')}</h2>
        <p class="sec-sub">${L(c,'subtitle')}</p>
      </div>
      <div class="contact-grid">

async function sendContactForm(e){
  e.preventDefault();
  const btn = document.getElementById('cf_btn');
  const name = document.getElementById('cf_name').value.trim();
  const email = document.getElementById('cf_email').value.trim();
  const subject = document.getElementById('cf_subject').value.trim();
  const message = document.getElementById('cf_message').value.trim();
  if(!name || !email || !message){ toast(ar()?'الاسم والإيميل والرسالة مطلوبة':'Name, email and message required', 'error'); return; }
  btn.disabled = true;
  const originalHTML = btn.innerHTML;
  btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> ${ar()?'جاري الإرسال...':'Sending...'}`;
  try{
    const r = await fetch('/api/contact', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, email, subject, message})
    });
    const d = await r.json().catch(()=>({}));
    if(r.ok && d.ok){
      toast(ar()?'✓ تم إرسال رسالتك بنجاح':'✓ Message sent successfully');
      ['cf_name','cf_email','cf_subject','cf_message'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
    } else {
      toast(d.error || (ar()?'فشل الإرسال':'Failed to send'), 'error');
    }
  }catch{ toast(ar()?'خطأ في الاتصال':'Connection error', 'error'); }
  finally{ btn.disabled = false; btn.innerHTML = originalHTML; }
}

let _scrollSetup = false;
let _io = null, _statsIo = null;
function setupScroll(){
  if(!_scrollSetup){
    const nav = document.querySelector('.nav');
    window.addEventListener('scroll', () => {
      nav.style.background = window.scrollY > 30 ? 'rgba(10,10,10,.95)' : 'rgba(10,10,10,.85)';
    });
    _scrollSetup = true;
  }
  // (Re)create observer for newly-rendered fade-up elements
  if(_io) _io.disconnect();
  _io = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('in'); _io.unobserve(e.target); }});
  }, {threshold:0.12});
  setTimeout(() => document.querySelectorAll('.fade-up').forEach(el => _io.observe(el)), 50);
  // Animated counters for stats
  if(_statsIo) _statsIo.disconnect();
  _statsIo = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting){
        animateCounter(e.target);
        _statsIo.unobserve(e.target);
      }
    });
  }, {threshold:0.3});
  setTimeout(() => document.querySelectorAll('.stat-num[data-target]').forEach(el => _statsIo.observe(el)), 60);
}

function animateCounter(el){
  const targetStr = el.dataset.target || '0';
  const suffix = el.dataset.suffix || '';
  const target = parseFloat(targetStr.replace(/,/g, '')) || 0;
  if(!target){ el.textContent = targetStr + suffix; return; }
  const duration = 1400;
  const start = performance.now();
  function tick(now){
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
    const val = Math.floor(target * eased);
    el.textContent = val.toLocaleString() + suffix;
    if(t < 1) requestAnimationFrame(tick);
    else el.textContent = targetStr + suffix;
  }
  requestAnimationFrame(tick);
}
