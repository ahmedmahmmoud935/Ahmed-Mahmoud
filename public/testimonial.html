<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>شاركنا رأيك</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Cairo',sans-serif;
  background:linear-gradient(135deg,#0a0a0a 0%,#1a0a1f 100%);
  color:#fff;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.container{width:100%;max-width:560px;background:#0f0f0f;border:1px solid #1f1f1f;border-radius:24px;padding:40px 36px 36px;box-shadow:0 24px 64px rgba(0,0,0,.6);}

/* Avatar upload area at top */
.avatar-zone{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
.avatar-ring{
  position:relative;width:100px;height:100px;cursor:pointer;
  border-radius:50%;background:#141414;
  border:2px solid #2a2a2a;
  transition:border-color .25s;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.avatar-ring:hover{border-color:#F97316;}
.avatar-ring img{width:100%;height:100%;object-fit:cover;display:none;border-radius:50%;}
.avatar-ring .av-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:#444;pointer-events:none;}
.avatar-ring .av-placeholder .av-person{font-size:38px;line-height:1;margin-top:6px;}
.avatar-ring .av-placeholder .av-cam{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.55);padding:6px 0 8px;
  display:flex;align-items:center;justify-content:center;gap:4px;
  font-size:11px;color:#aaa;font-weight:700;letter-spacing:.3px;
}
.avatar-ring .av-placeholder .av-cam i{font-size:11px;}
.avatar-ring:hover .av-placeholder .av-cam{color:#F97316;}
.avatar-edit-badge{
  position:absolute;bottom:4px;inset-inline-end:4px;
  width:24px;height:24px;border-radius:50%;
  background:#F97316;border:2px solid #0f0f0f;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#fff;pointer-events:none;
}
.avatar-remove{
  margin-top:8px;background:none;border:none;
  color:#666;font-size:11px;cursor:pointer;font-family:inherit;
  display:none;transition:color .2s;
}
.avatar-remove:hover{color:#ef4444;}

/* Header */
.header{text-align:center;margin-bottom:28px;}
h1{font-size:22px;font-weight:800;margin-bottom:6px;}
.sub{color:#888;font-size:13px;line-height:1.7;}

.fg{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:700;margin-bottom:7px;color:#bbb;text-transform:uppercase;letter-spacing:.4px;}
.req{color:#ef4444;}
input,textarea{width:100%;background:#0a0a0a;border:1px solid #252525;color:#fff;padding:11px 14px;border-radius:10px;font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;}
input:focus,textarea:focus{border-color:#F97316;}
textarea{min-height:110px;resize:vertical;line-height:1.7;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.rating{display:flex;gap:6px;margin-top:4px;justify-content:center;}
.star{cursor:pointer;font-size:30px;color:#333;transition:all .15s;}
.star.active{color:#fbbf24;transform:scale(1.1);}
.star:hover{color:#fbbf24;}
.optional{color:#555;font-size:10px;font-weight:400;margin-inline-start:5px;text-transform:none;}

/* Buttons */
.btn{width:100%;background:linear-gradient(135deg,#F97316,#ea580c);color:#fff;border:none;padding:14px;border-radius:12px;font-family:inherit;font-weight:800;font-size:15px;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(249,115,22,.3);transition:all .2s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(249,115,22,.42);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.btn-visit{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid rgba(255,255,255,.15);color:#fff;padding:12px 24px;border-radius:10px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;text-decoration:none;transition:all .25s;margin-top:20px;}
.btn-visit:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.3);}

/* Error & success */
.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;margin-inline-end:8px;}
@keyframes sp{to{transform:rotate(360deg);}}
.success{text-align:center;padding:40px 20px;display:none;}
.success-icon{width:80px;height:80px;background:#22c55e;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px;}
.divider{height:1px;background:#1a1a1a;margin:20px 0;}
@media(max-width:480px){.container{padding:28px 18px 24px;}.row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="container">

  <!-- Form -->
  <div id="formView">

    <!-- Avatar at top -->
    <div class="avatar-zone">
      <input type="file" id="fPhoto" accept="image/*" style="display:none" onchange="handlePhoto(this)">
      <div class="avatar-ring" id="avatarRing" onclick="document.getElementById('fPhoto').click()">
        <img id="avatarImg" src="" alt="">
        <div class="av-placeholder" id="avatarPlaceholder">
          <i class="fa-solid fa-circle-user av-person"></i>
          <div class="av-cam"><i class="fa-solid fa-camera"></i> صورتك</div>
        </div>
        <div class="avatar-edit-badge"><i class="fa-solid fa-plus"></i></div>
      </div>
      <button class="avatar-remove" id="avatarRemoveBtn" onclick="removePhoto()">
        <i class="fa-solid fa-xmark"></i> إزالة الصورة
      </button>
    </div>

    <div class="header">
      <h1>شاركنا رأيك</h1>
      <p class="sub">رأيك يهمنا — اكتب تجربتك معنا في كلمات بسيطة</p>
    </div>

    <div class="error-msg" id="errMsg"></div>

    <div class="fg">
      <label>الاسم الكامل <span class="req">*</span></label>
      <input type="text" id="fName" placeholder="مثال: أحمد محمود" maxlength="100">
    </div>

    <div class="row">
      <div class="fg">
        <label>المسمى الوظيفي <span class="optional">(اختياري)</span></label>
        <input type="text" id="fRole" placeholder="مثال: مدير تسويق" maxlength="100">
      </div>
      <div class="fg">
        <label>الشركة <span class="optional">(اختياري)</span></label>
        <input type="text" id="fCompany" placeholder="مثال: شركة سندك" maxlength="100">
      </div>
    </div>

    <div class="fg">
      <label>تقييمك <span class="req">*</span></label>
      <div class="rating" id="rating">
        <span class="star active" data-v="1">★</span>
        <span class="star active" data-v="2">★</span>
        <span class="star active" data-v="3">★</span>
        <span class="star active" data-v="4">★</span>
        <span class="star active" data-v="5">★</span>
      </div>
    </div>

    <div class="fg">
      <label>رأيك <span class="req">*</span></label>
      <textarea id="fContent" placeholder="اكتب رأيك بصراحة... ما الذي أعجبك في تجربتك؟" maxlength="2000"></textarea>
    </div>

    <button class="btn" id="submitBtn" onclick="submitForm()">
      <span id="btnText"><i class="fa-solid fa-paper-plane" style="margin-inline-end:8px;"></i>إرسال الرأي</span>
    </button>
  </div>

  <!-- Success -->
  <div class="success" id="successView">
    <div class="success-icon"><i class="fa-solid fa-check"></i></div>
    <h1 style="margin-bottom:14px;">شكراً لك! 🎉</h1>
    <p style="color:#999;font-size:14px;line-height:1.9;">
      تم استلام رأيك بنجاح.<br>
      سيتم مراجعته قبل النشر على الموقع.<br>
      <span style="color:#F97316;">نقدّر وقتك وملاحظتك!</span>
    </p>
    <a id="visitBtn" href="#" class="btn-visit" style="display:none;">
      <i class="fa-solid fa-arrow-up-right-from-square"></i>
      زيارة الموقع
    </a>
  </div>

</div>
<script>
const USERNAME = location.pathname.split('/').filter(Boolean).pop();
let rating = 5;
let photoBase64 = null;

// Star rating
document.querySelectorAll('.star').forEach(star => {
  star.addEventListener('click', e => {
    const v = parseInt(e.target.dataset.v);
    rating = v;
    document.querySelectorAll('.star').forEach((s,i) => s.classList.toggle('active', i < v));
  });
  star.addEventListener('mouseenter', e => {
    const v = parseInt(e.target.dataset.v);
    document.querySelectorAll('.star').forEach((s,i) => { s.style.color = i < v ? '#fbbf24' : '#333'; });
  });
});
document.getElementById('rating').addEventListener('mouseleave', () => {
  document.querySelectorAll('.star').forEach((s,i) => {
    s.style.color = i < rating ? '#fbbf24' : '#333';
    s.classList.toggle('active', i < rating);
  });
});

function handlePhoto(input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 5*1024*1024){ showError('الصورة أكبر من 5 ميجا'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    photoBase64 = e.target.result;
    const img = document.getElementById('avatarImg');
    img.src = photoBase64;
    img.style.display = 'block';
    document.getElementById('avatarPlaceholder').style.display = 'none';
    document.getElementById('avatarRemoveBtn').style.display = 'inline-block';
    document.getElementById('avatarRing').style.borderColor = '#F97316';
  };
  reader.readAsDataURL(file);
}

function removePhoto(){
  photoBase64 = null;
  document.getElementById('fPhoto').value = '';
  const img = document.getElementById('avatarImg');
  img.src = ''; img.style.display = 'none';
  document.getElementById('avatarPlaceholder').style.display = 'flex';
  document.getElementById('avatarRemoveBtn').style.display = 'none';
  document.getElementById('avatarRing').style.borderColor = '';
}

function showError(msg){
  const el = document.getElementById('errMsg');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function resetBtn(){
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('btnText').innerHTML = '<i class="fa-solid fa-paper-plane" style="margin-inline-end:8px;"></i>إرسال الرأي';
}

async function submitForm(){
  const name = document.getElementById('fName').value.trim();
  const content = document.getElementById('fContent').value.trim();
  if(!name){ showError('من فضلك اكتب اسمك'); return; }
  if(content.length < 10){ showError('الرأي قصير جداً (10 أحرف على الأقل)'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  document.getElementById('btnText').innerHTML = '<span class="spin"></span>جاري الإرسال...';

  try{
    const userRes = await fetch('/api/users/by-username/' + encodeURIComponent(USERNAME));
    if(!userRes.ok){ showError('المستخدم غير موجود'); resetBtn(); return; }
    const userData = await userRes.json();

    const r = await fetch('/api/testimonials/submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        user_id: userData.id,
        name, content, rating,
        role: document.getElementById('fRole').value.trim(),
        company: document.getElementById('fCompany').value.trim(),
        photo: photoBase64 || '',
      })
    });
    const d = await r.json();
    if(r.ok){
      document.getElementById('formView').style.display = 'none';
      document.getElementById('successView').style.display = 'block';
      if(d.portfolio_url){
        const vBtn = document.getElementById('visitBtn');
        vBtn.href = d.portfolio_url;
        vBtn.style.display = 'inline-flex';
      }
    } else {
      showError(d.error || 'فشل الإرسال');
      resetBtn();
    }
  }catch(e){
    showError('خطأ في الاتصال — تأكد من الاتصال بالإنترنت');
    resetBtn();
  }
}
</script>
</body>
</html>
